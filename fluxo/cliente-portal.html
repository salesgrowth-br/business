<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Growth Insights · Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f6;--w:#fff;--sf2:#f9f9fb;--sf3:#f2f2f4;
  --b:#e2e2e8;--b2:#c4c4cc;
  --t:#0a0a10;--t2:#3a3a48;--t3:#6e6e80;--t4:#9898a8;
  --blue:#0011CE;--blueg:rgba(0,17,206,.08);--blueb:rgba(0,17,206,.18);
  --green:#007a50;--gbg:#ebf7f1;--gbr:rgba(0,122,80,.2);
  --red:#b83030;--rbg:#fef0ee;--rbr:rgba(184,48,48,.18);
  --amber:#8f6000;--abg:#fdf3e3;--abr:rgba(143,96,0,.2);
  --fd:'Inclusive Sans',system-ui,sans-serif;
  --fs:'Inter',system-ui,sans-serif;
  --r:13px;--rs:9px;
  --sh:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);
  --sh2:0 4px 20px rgba(0,0,0,.09);
}
html,body{background:var(--bg);color:var(--t);font-family:var(--fd);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:14px;line-height:1.5}

/* ── TOP BAR ── */
.top{background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:80}
.top-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--t)}
.top-logo-name{font-family:var(--fs);font-size:12px;font-weight:700;letter-spacing:-.02em}
.top-logo-pill{font-family:var(--fs);font-size:9px;background:var(--blueg);color:var(--blue);border:1px solid var(--blueb);padding:2px 7px;border-radius:10px;letter-spacing:.05em;text-transform:uppercase}
.top-right{display:flex;align-items:center;gap:8px}
.top-av{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:11px;font-weight:700;color:#fff;overflow:hidden}
.top-av img{width:100%;height:100%;object-fit:cover}
.top-name{font-family:var(--fs);font-size:12px;font-weight:600}

/* ── MONTH NAV ── */
.month-nav{background:var(--w);border-bottom:1px solid var(--b);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:0;position:sticky;top:52px;z-index:79}
.mnav-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--b);background:var(--w);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);font-size:16px;transition:all .15s;flex-shrink:0;user-select:none;padding:0}
.mnav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blueg)}
.mnav-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.mnav-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px}
.mnav-label{font-family:var(--fs);font-size:14px;font-weight:700;color:var(--t);letter-spacing:-.02em}
.mnav-pending{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite;flex-shrink:0}

/* ── LAYOUT ── */
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 80px}

/* ── HERO ── */
.hero{border-radius:var(--r);overflow:hidden;margin-bottom:22px;box-shadow:var(--sh2)}
.hero-top{background:var(--t);padding:26px 28px 22px;position:relative;overflow:hidden}
.hero-top::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,21,255,.35),transparent 65%);pointer-events:none}
.hero-brand{display:flex;align-items:center;gap:13px;margin-bottom:20px;position:relative;z-index:1}
.hero-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero-label{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:.12em;text-transform:uppercase;font-family:var(--fs);margin-bottom:3px}
.hero-company{font-family:var(--fs);font-size:17px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hero-kpis{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hk{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);padding:12px;text-align:center}
.hk.hi{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.07)}
.hk-v{font-family:var(--fs);font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1}
.hk-l{font-size:9px;color:rgba(255,255,255,.38);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.hero-bot{background:var(--sf3);border-top:1px solid var(--b);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hero-bot-l{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t4)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hero-period{font-family:var(--fs);font-size:11px;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:5px}

/* ── SECTION LABEL ── */
.sec-lbl{font-family:var(--fs);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin:22px 0 11px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--b)}

/* ── SEMANAS ── */
.wk{background:var(--w);border:1px solid var(--b);border-radius:var(--r);margin-bottom:9px;overflow:hidden;box-shadow:var(--sh);transition:border-color .13s}
.wk:hover{border-color:var(--b2)}
.wk.pending{border-color:var(--abr)}
.wk-h{display:flex;align-items:stretch;cursor:pointer;user-select:none;min-height:64px}
.wk-lbl{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;width:68px;background:var(--sf3);border-right:1px solid var(--b);text-align:center}
.wk.pending .wk-lbl{background:var(--abg);border-right-color:var(--abr)}
.wk-num{font-family:var(--fs);font-size:26px;font-weight:700;color:var(--t);letter-spacing:-.04em;line-height:1}
.wk-tag{font-family:var(--fs);font-size:8px;font-weight:500;color:var(--t4);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.wk-body{flex:1;padding:13px 17px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.wk-per{font-family:var(--fs);font-size:13px;font-weight:500;color:var(--t)}
.wk-sub{font-size:11px;color:var(--t4);margin-top:4px;display:flex;align-items:center;gap:6px}
.wk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wk-right{display:flex;align-items:center;gap:9px;padding:0 14px;flex-shrink:0;border-left:1px solid var(--b)}
.wk.pending .wk-right{border-left-color:var(--abr)}
.wk-roas{font-family:var(--fs);font-size:16px;font-weight:700}
.up{color:var(--green)}.wc{color:var(--amber)}.dn{color:var(--red)}
.wk-chev{width:28px;height:28px;border-radius:7px;border:1px solid var(--b);display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:13px;background:var(--w);transition:all .14s}
.wk-h:hover .wk-chev{border-color:var(--b2)}
.wk-b{display:none;border-top:1px solid var(--b)}.wk-b.open{display:block}
.bx{font-family:var(--fs);font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase}
.bok{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.bwn{background:var(--abg);color:var(--amber);border:1px solid var(--abr)}

/* ── FILL FORM ── */
.wk-fill{padding:20px}
.fill-notice{background:var(--gbg);border:1px solid var(--gbr);border-radius:var(--rs);padding:12px 14px;font-size:11px;color:var(--green);display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;line-height:1.7}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fl{font-family:var(--fs);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--t4);margin-bottom:5px;display:block}
.fi{width:100%;border:1px solid var(--b);border-radius:var(--rs);padding:9px 12px;font-size:14px;color:var(--t);outline:none;background:var(--w);transition:border-color .15s;font-family:var(--fd)}
.fi:focus{border-color:var(--blue)}.fi::placeholder{color:var(--t4);font-size:12px}
textarea.fi{resize:none;font-size:13px;line-height:1.6}
.fip{position:relative}
.fip .sym{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t4);pointer-events:none;font-family:var(--fs)}
.fip .fi{padding-left:28px}

/* ── CALC ── */
.cp{background:var(--blueg);border:1px solid var(--blueb);border-radius:var(--rs);padding:13px 16px;margin-bottom:13px;display:none}
.cp-lbl{font-family:var(--fs);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:10px;font-weight:600}
.cp-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cpi{text-align:center}
.cpv{font-family:var(--fs);font-size:16px;font-weight:700}
.cpl{font-size:9px;color:var(--t4);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

/* ── WEEK SUMMARY ── */
.wsum{padding:16px}
.wsum-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.wki{background:var(--sf3);border:1px solid var(--b);border-radius:var(--rs);padding:12px 8px;text-align:center}
.wki.hi{background:var(--gbg);border-color:var(--gbr)}
.wki-v{font-family:var(--fs);font-size:15px;font-weight:700;letter-spacing:-.025em;line-height:1}
.wki-l{font-size:9px;color:var(--t4);margin-top:4px;text-transform:uppercase;letter-spacing:.07em}
.wsum-extra{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.wse{background:var(--sf3);border:1px solid var(--b);border-radius:var(--rs);padding:10px 8px;text-align:center}
.wse-v{font-family:var(--fs);font-size:12px;font-weight:600;color:var(--t2)}
.wse-l{font-size:9px;color:var(--t4);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.pdf-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:11px 13px;background:var(--gbg);border:1px solid var(--gbr);border-radius:var(--rs)}
.pdf-row-l{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--green)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;transition:all .14s;border:none;font-family:var(--fs)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#000faa}
.btn-out{background:var(--w);color:var(--t);border:1px solid var(--b)}.btn-out:hover{border-color:var(--b2)}
.btn-full{width:100%}
.pdf-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;cursor:pointer;padding:5px 11px;border-radius:6px;border:1px solid var(--b);background:var(--w);color:var(--t2);transition:all .12s;font-family:var(--fs);text-decoration:none}
.pdf-btn:hover{border-color:var(--b2);color:var(--t)}
.pdf-btn.primary{background:var(--blueg);border-color:var(--blueb);color:var(--blue)}
.pdf-btn.primary:hover{background:rgba(0,17,206,.13)}

/* ── SUCCESS ── */
.sbox{text-align:center;padding:28px;border:1px solid var(--gbr);background:var(--gbg);border-radius:var(--r)}
.sbox-ico{font-size:34px;margin-bottom:9px}
.sbox-t{font-family:var(--fs);font-size:14px;font-weight:700;color:var(--green)}
.sbox-s{font-size:11px;color:var(--t4);margin-top:5px;line-height:1.7}

/* ── CONTRATO ── */
.ct-card{background:var(--w);border:1px solid var(--b);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ct-dark{background:var(--t);padding:22px 26px;position:relative;overflow:hidden}
.ct-dark::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(0,21,255,.35),transparent 65%);pointer-events:none}
.ct-dark-inner{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1}
.ct-lbl{font-family:var(--fs);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.38);margin-bottom:6px}
.ct-val{font-family:var(--fs);font-size:20px;font-weight:700;letter-spacing:-.025em;color:#fff}
.ct-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:5px;letter-spacing:.04em;text-transform:uppercase}
.ct-cells{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b)}
.ct-cell{background:var(--w);padding:14px 18px}
.ct-cell.status-ok{background:var(--gbg)}
.ct-cell.pgto-dark{background:var(--t)}
.ct-cell-lbl{font-family:var(--fs);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--t4);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ct-cell-val{font-family:var(--fs);font-size:14px;font-weight:700;color:var(--t)}
.ct-cell-sub{font-size:10px;color:var(--t4);margin-top:3px}
.ct-info-bar{padding:14px 20px;background:var(--sf3);border-top:1px solid var(--b);font-size:11px;color:var(--t4);line-height:1.7}

/* ── NF SECTION ── */
.nf-block{background:var(--w);border:1px solid var(--b);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.nf-item{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid var(--b);transition:background .12s}
.nf-item:last-child{border-bottom:none}
.nf-item:hover{background:var(--sf3)}
.nf-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid}
.nf-icon.servico{background:var(--gbg);border-color:var(--gbr);color:var(--green)}
.nf-icon.anuncio{background:var(--blueg);border-color:var(--blueb);color:var(--blue)}
.nf-info{flex:1;min-width:0}
.nf-name{font-family:var(--fs);font-size:12px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nf-meta{font-size:10px;color:var(--t4);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.nf-dot{width:3px;height:3px;border-radius:50%;background:var(--b2)}
.nf-value{font-family:var(--fs);font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0}
.nf-acts{display:flex;gap:6px;flex-shrink:0}
.nf-pending-box{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--abg)}
.nf-pending-icon{width:38px;height:38px;border-radius:9px;background:var(--w);border:1px solid var(--abr);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--amber);flex-shrink:0}

/* ── FOLDER LINK ── */
.folder-link{display:flex;align-items:center;gap:13px;padding:14px 18px;background:var(--w);border-radius:var(--r);border:1px solid var(--b);cursor:pointer;transition:all .15s;text-decoration:none;box-shadow:var(--sh);margin-bottom:12px}
.folder-link:hover{border-color:var(--blue);background:var(--blueg)}
.folder-link-icon{width:42px;height:42px;border-radius:11px;background:var(--blueg);border:1px solid var(--blueb);display:flex;align-items:center;justify-content:center;font-size:21px;color:var(--blue);flex-shrink:0}
.folder-link-name{font-family:var(--fs);font-size:13px;font-weight:600;color:var(--t)}
.folder-link-url{font-size:11px;color:var(--t4);margin-top:3px}

/* ── PDF VIEWER ── */
.pdf-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;flex-direction:column;backdrop-filter:blur(4px)}
.pdf-ov.on{display:flex}
.pdf-bar{background:var(--t);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;flex-shrink:0;gap:12px}
.pdf-fname{font-size:12px;color:rgba(255,255,255,.65);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--fs)}
.pdf-close{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.7);font-size:18px;transition:all .12s}
.pdf-close:hover{background:rgba(255,255,255,.14);color:#fff}
.pdf-body{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:24px;background:rgba(0,0,0,.45)}
.pdf-ph{background:var(--w);border-radius:var(--r);width:100%;max-width:680px;min-height:440px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 32px;text-align:center}
.pdf-ph i{font-size:48px;color:var(--b2)}
.pdf-ph-t{font-family:var(--fs);font-size:15px;font-weight:600;color:var(--t2)}
.pdf-ph-s{font-size:11px;color:var(--t4);line-height:1.7;max-width:320px}

/* ── EMPTY STATE ── */
.empty-state{padding:32px 20px;text-align:center;background:var(--w);border:1px solid var(--b);border-radius:var(--r);box-shadow:var(--sh)}
.empty-state i{font-size:36px;color:var(--b2);display:block;margin-bottom:12px}
.empty-state-t{font-family:var(--fs);font-size:13px;font-weight:600;color:var(--t2);margin-bottom:5px}
.empty-state-s{font-size:11px;color:var(--t4);line-height:1.7}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .hero-top{padding:20px 16px 18px}
  .hero-kpis{grid-template-columns:repeat(2,1fr)}
  .hero-kpis .hk:last-child{grid-column:1/-1}
  .wrap{padding:18px 14px 60px}
  .wk-lbl{width:58px}
  .wk-num{font-size:22px}
  .form-row{grid-template-columns:1fr}
  .wsum-kpis{grid-template-columns:repeat(2,1fr)}
  .wsum-extra{grid-template-columns:1fr 1fr}
  .ct-cells{grid-template-columns:1fr}
  .ct-dark{padding:18px}
  .nf-item{flex-wrap:wrap;gap:10px}
  .nf-acts{width:100%}
  .nf-acts .pdf-btn{flex:1;justify-content:center}
  .month-tab{padding:12px 14px}
}
</style>
</head>
<body>

<!-- PDF VIEWER -->
<div class="pdf-ov" id="pdf-ov">
  <div class="pdf-bar">
    <i class="ti ti-file-type-pdf" style="font-size:18px;color:rgba(255,255,255,.5);flex-shrink:0"></i>
    <div class="pdf-fname" id="pdf-fname">documento.pdf</div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <a class="pdf-btn primary" href="#" onclick="dlSim();return false"><i class="ti ti-download" style="font-size:12px"></i>Baixar</a>
      <div class="pdf-close" onclick="closePDF()">×</div>
    </div>
  </div>
  <div class="pdf-body">
    <div class="pdf-ph">
      <i class="ti ti-file-type-pdf"></i>
      <div class="pdf-ph-t" id="pdf-ph-t">documento.pdf</div>
      <div class="pdf-ph-s">No ambiente de produção o PDF abre aqui em tela cheia. Use o botão abaixo para baixar.</div>
      <a class="btn btn-blue" href="#" onclick="dlSim();return false" style="margin-top:8px;text-decoration:none"><i class="ti ti-download"></i>Baixar PDF</a>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="top">
  <a class="top-logo" href="#">
    <svg width="18" height="15" viewBox="0 0 588 470" fill="none">

// ── Atualiza nav de meses ──
function renderMonthBar() {
  const idx = MONTHS_ORDER.indexOf(currentMonth);
  const d = MONTHS_DATA[currentMonth];
  const label = document.getElementById('month-label');
  const pending = document.getElementById('month-pending');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  if(label) label.textContent = d.label;
  if(pending) pending.style.display = d.pending ? 'block' : 'none';
  if(btnPrev) btnPrev.disabled = idx >= MONTHS_ORDER.length - 1;
  if(btnNext) btnNext.disabled = idx <= 0;
}

// ── Navega meses ──
function prevMonth() {
  const idx = MONTHS_ORDER.indexOf(currentMonth);
  if(idx < MONTHS_ORDER.length-1) {
    currentMonth = MONTHS_ORDER[idx+1];
    renderMonthBar();
    renderContent();
    window.scrollTo({top:52,behavior:'smooth'});
  }
}
function nextMonth() {
  const idx = MONTHS_ORDER.indexOf(currentMonth);
  if(idx > 0) {
    currentMonth = MONTHS_ORDER[idx-1];
    renderMonthBar();
    renderContent();
    window.scrollTo({top:52,behavior:'smooth'});
  }
}

// ── Renderiza uma semana ──

      <div class="wk-b open">

            <div class="fg" style="margin-bottom:0"><label class="fl">Vendas fechadas</label><input class="fi" type="number" placeholder="Ex: 9" id="v${s.num}" oninput="calcW(${s.num},${s.inv},${s.leads})"></div>
            <div class="fg" style="margin-bottom:0"><label class="fl">Leads gerados</label><input class="fi" type="number" placeholder="Ex: ${s.leads}" id="l${s.num}"></div>
          </div>
          <div class="fg" style="margin-top:12px"><label class="fl">Faturamento Bruto (valor total dos pacotes)</label><div class="fip"><span class="sym">R$</span><input class="fi" type="number" placeholder="Ex: 90.000" id="fat${s.num}" oninput="calcW(${s.num},${s.inv},${s.leads})"></div></div>
          <div class="fg"><label class="fl">Lucro Líquido</label><div class="fip"><span class="sym">R$</span><input class="fi" type="number" placeholder="Ex: 9.000" id="lucro${s.num}" oninput="calcW(${s.num},${s.inv},${s.leads})"></div></div>
          <div class="cp" id="cp${s.num}">
            <div class="cp-lbl">Seus resultados em tempo real</div>

              <div class="cpi"><div class="cpv" id="cr-${s.num}">—</div><div class="cpl">ROAS</div></div>

      </div>

  const extraHtml = s.extra.map(e => `<div class="wse"><div class="wse-v">${e.v}</div><div class="wse-l">${e.l}</div></div>`).join('');
  return `
  <div class="wk" id="wk-${s.num}">
    <div class="wk-h" onclick="twk(this)">
      <div class="wk-lbl"><div class="wk-num">${s.num}</div><div class="wk-tag">Semana</div></div>
      <div class="wk-body">
        <div class="wk-per">${s.per}</div>
        <div class="wk-sub"><div class="wk-dot" style="background:var(--green)"></div>${s.sub}</div>

      <div class="wk-right">
        <div class="wk-roas up">${s.roas}</div>
        <span class="bx bok">Enviado</span>
        <div class="wk-chev"><i class="ti ti-chevron-down" style="font-size:13px"></i></div>

// ── Toggle semana ──
function twk(el) {
  const b = el.nextElementSibling;
  const chev = el.querySelector('.ti-chevron-down,.ti-chevron-up');
  b.classList.toggle('open');
  if (chev) chev.style.transform = b.classList.contains('open') ? 'rotate(180deg)' : '';
}

// ── Cálculo em tempo real ──
function calcW(num, inv, leads) {
  const v = parseInt(document.getElementById('v'+num)?.value)||0;
  const fat = parseFloat(document.getElementById('fat'+num)?.value)||0;
  const lucro = parseFloat(document.getElementById('lucro'+num)?.value)||0;
  const base = lucro>0?lucro:fat;
  const cp = document.getElementById('cp'+num);
  if(base>0&&cp){
    cp.style.display='block';
    const roas=(base/inv).toFixed(1)+'x';
    const col=parseFloat(roas)>=3?'var(--green)':parseFloat(roas)>=2?'var(--amber)':'var(--red)';
    document.getElementById('cr-'+num).textContent=roas;
    document.getElementById('cr-'+num).style.color=col;
    document.getElementById('ct-'+num).textContent=v>0?'R$ '+(base/v).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.'):'—';
    document.getElementById('cc-'+num).textContent='R$ '+(inv/leads).toFixed(2).replace('.',',');
  } else if(cp) cp.style.display='none';
}

// ── Enviar resultados ──
function enviarW(num, inv) {
  const v = document.getElementById('v'+num)?.value||'0';
  const lucro = parseFloat(document.getElementById('lucro'+num)?.value)||0;
  const fat = parseFloat(document.getElementById('fat'+num)?.value)||0;
  const base = lucro>0?lucro:fat;
  const roas = base>0?(base/inv).toFixed(1)+'x':'—';
  const fill = document.getElementById('fill-'+num);
  if(fill) fill.innerHTML=`
    <div class="sbox">
      <div class="sbox-ico">✅</div>
      <div class="sbox-t">Resultados enviados com sucesso!</div>
      <div class="sbox-s">${v} vendas · Lucro Líquido R$ ${lucro.toLocaleString('pt-BR')} · ROAS ${roas}<br>A Sales Growth vai usar esses dados para otimizar suas campanhas. 🚀</div>
    </div>`;
}

// ── PDF Viewer ──
function openPDF(fname) {
  document.getElementById('pdf-fname').textContent = fname;
  document.getElementById('pdf-ph-t').textContent = fname;
  document.getElementById('pdf-ov').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closePDF() {
  document.getElementById('pdf-ov').classList.remove('on');
  document.body.style.overflow = '';
}
function dlSim(fname) {
  fname = fname || document.getElementById('pdf-fname').textContent;
  alert('Download: '+fname+'\n\nNo ambiente de produção, o arquivo seria baixado diretamente.');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePDF(); });

// ── Init ──
renderMonthBar();
renderContent();
</script>
